name: Keep Supabase alive

# Free-tier Supabase projects pause after ~7 days with insufficient database activity.
# Auth health checks do NOT count — we must hit Postgres via the REST API.
on:
  schedule:
    # Daily at 12:00 UTC — Supabase expects a few DB requests per day over the week.
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query keepalive table via REST API
        run: |
          base="${{ secrets.PLACES_SUPABASE_URL }}"
          key="${{ secrets.PLACES_SUPABASE_ANON_KEY }}"
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            "${base}/rest/v1/keepalive?select=id&limit=1" \
            -H "apikey: ${key}" \
            -H "Authorization: Bearer ${key}")
          echo "HTTP $response"
          cat /tmp/body
          if [ "$response" != "200" ]; then
            echo "Keepalive query failed. Run supabase/keepalive.sql in the SQL Editor if the table is missing."
            exit 1
          fi
