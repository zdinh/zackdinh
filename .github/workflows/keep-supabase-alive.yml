name: Keep Supabase alive

# Free-tier Supabase projects pause after ~7 days with insufficient database activity.
# Auth health checks do NOT count — we must hit Postgres via the REST API.
# Supabase expects a few user DB requests per day; a single daily SELECT is often not enough.
on:
  schedule:
    # Three times daily (00:00, 08:00, 16:00 UTC).
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Update keepalive row via REST API
        run: |
          base="${{ secrets.PLACES_SUPABASE_URL }}"
          key="${{ secrets.PLACES_SUPABASE_ANON_KEY }}"
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          response=$(curl -s -o /tmp/body -w "%{http_code}" -X PATCH \
            "${base}/rest/v1/keepalive?id=eq.1" \
            -H "apikey: ${key}" \
            -H "Authorization: Bearer ${key}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"pinged_at\": \"${timestamp}\"}")
          echo "HTTP $response (pinged_at=${timestamp})"
          cat /tmp/body
          if [ "$response" != "204" ] && [ "$response" != "200" ]; then
            echo "Keepalive update failed. Re-run supabase/keepalive.sql in the SQL Editor (UPDATE policy required)."
            exit 1
          fi
